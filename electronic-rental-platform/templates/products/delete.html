{% extends 'base.html' %}

{% block title %}Delete {{ product.title }} - RentalHub{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 3rem;">
    <div class="card">
        <h1 style="margin-bottom: 1rem; color: var(--color-error);">Delete Product</h1>
        <p style="margin-bottom: 2rem; font-size: 1.125rem;">Are you sure you want to delete <strong>{{ product.title }}</strong>? This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1; background-color: var(--color-error);">Yes, Delete</button>
                <a href="{% url 'products:detail' product.pk %}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
